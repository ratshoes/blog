<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <pattern id="camo" patternUnits="userSpaceOnUse" width="16" height="16">
      <rect width="16" height="16" fill="#0e1a2b"/>
      <rect x="0" y="0" width="4" height="4" fill="#1e3652"/>
      <rect x="8" y="0" width="4" height="4" fill="#3a5c80"/>
      <rect x="4" y="4" width="4" height="4" fill="#2a4a6a"/>
      <rect x="12" y="4" width="4" height="4" fill="#0a1420"/>
      <rect x="0" y="8" width="4" height="4" fill="#4f6e8c"/>
      <rect x="8" y="8" width="4" height="4" fill="#0a1420"/>
      <rect x="4" y="12" width="4" height="4" fill="#3a5c80"/>
      <rect x="12" y="12" width="4" height="4" fill="#1e3652"/>
      <rect x="2" y="2" width="2" height="2" fill="#5a7a9e"/>
      <rect x="10" y="6" width="2" height="2" fill="#1e3652"/>
      <rect x="6" y="10" width="2" height="2" fill="#0e1a2b"/>
      <rect x="14" y="2" width="2" height="2" fill="#2a4a6a"/>
      <rect x="0" y="14" width="2" height="2" fill="#4f6e8c"/>
      <rect x="6" y="0" width="2" height="2" fill="#1e3652"/>
      <rect x="10" y="14" width="2" height="2" fill="#5a7a9e"/>
      <rect x="14" y="10" width="2" height="2" fill="#2a4a6a"/>
    </pattern>
  </defs>

  <!-- Blueberry camo background -->
  <rect width="64" height="64" fill="url(#camo)"/>

  <!-- Spanning tree topology lines (active) -->
  <line x1="32" y1="18" x2="16" y2="36" stroke="#a0c4e8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="18" x2="48" y2="36" stroke="#a0c4e8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="36" x2="9"  y2="54" stroke="#a0c4e8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="36" x2="55" y2="54" stroke="#a0c4e8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Blocked port (dashed) — shows STP loop prevention -->
  <line x1="16" y1="36" x2="30" y2="54" stroke="#5a7a9e" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3,2"/>

  <!-- Root node: treehouse (house silhouette) -->
  <polygon points="32,4 42,14 22,14" fill="#e2e8f0"/>
  <rect x="26" y="14" width="12" height="8" fill="#e2e8f0"/>
  <rect x="30" y="17" width="4" height="5" fill="#0e1a2b"/>

  <!-- Left child node -->
  <circle cx="16" cy="36" r="4" fill="#a0c4e8"/>
  <!-- Right child node -->
  <circle cx="48" cy="36" r="4" fill="#a0c4e8"/>

  <!-- Active leaf nodes -->
  <circle cx="9"  cy="54" r="3.5" fill="#a0c4e8"/>
  <circle cx="55" cy="54" r="3.5" fill="#a0c4e8"/>

  <!-- Blocked leaf node (dimmed, port blocked indicator) -->
  <circle cx="30" cy="54" r="3.5" fill="#1e3652"/>
  <line x1="28" y1="52" x2="32" y2="56" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="52" x2="28" y2="56" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
</svg>
